<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CityFlow — Panel Conductor</title>
  <meta name="description" content="Panel de control para conductores de autobús de CityFlow Madrid.">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<button class="btn-menu-toggle" id="menu-toggle">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
  </svg>
</button>
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="page-header">
      <div style="display:flex; align-items:center; gap:0.875rem">
        <div style="width:48px;height:48px;border-radius:var(--radius-lg);background:var(--secondary);display:flex;align-items:center;justify-content:center">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2">
            <rect x="1" y="3" width="22" height="16" rx="2"/><path d="M1 9h22M7 3v16M17 3v16"/>
            <circle cx="7" cy="19" r="2"/><circle cx="17" cy="19" r="2"/>
          </svg>
        </div>
        <div>
          <h1 class="page-title">Panel Conductor</h1>
          <p class="page-subtitle" id="conductor-subtitle">Cargando...</p>
        </div>
      </div>
    </div>
    <div class="page-content">

      <!-- Acciones rápidas -->
      <div class="grid-3 animate-in" style="margin-bottom:1.5rem">
        <button class="card" style="cursor:pointer;text-align:center;border:none;background:var(--card);transition:all 0.2s" 
                onclick="openIncidentForm('normal')" id="btn-incidencia">
          <div style="color:var(--warning);display:flex;justify-content:center;margin-bottom:0.5rem">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
              <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
          </div>
          <div style="font-family:'Space Grotesk',sans-serif;font-size:0.85rem;font-weight:600;color:var(--fg)">Incidencia</div>
        </button>
        <button class="card" style="cursor:pointer;text-align:center;border:none;background:var(--card);transition:all 0.2s;border-color:var(--danger-bg)"
                onclick="openIncidentForm('urgencia')">
          <div style="color:var(--danger);display:flex;justify-content:center;margin-bottom:0.5rem">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="7.86 2 16.14 2 22 7.86 22 16.14 16.14 22 7.86 22 2 16.14 2 7.86 7.86 2"/>
              <line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
          </div>
          <div style="font-family:'Space Grotesk',sans-serif;font-size:0.85rem;font-weight:600;color:var(--fg)">Urgencia</div>
        </button>
        <button class="card" style="cursor:pointer;text-align:center;border:none;background:var(--card);transition:all 0.2s"
                onclick="openIncidentForm('refuerzo')">
          <div style="color:var(--info);display:flex;justify-content:center;margin-bottom:0.5rem">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="1" y="3" width="22" height="16" rx="2"/>
              <path d="M1 9h22M7 3v16M17 3v16"/><circle cx="7" cy="19" r="2"/><circle cx="17" cy="19" r="2"/>
            </svg>
          </div>
          <div style="font-family:'Space Grotesk',sans-serif;font-size:0.85rem;font-weight:600;color:var(--fg)">Refuerzo</div>
        </button>
      </div>

      <!-- Formulario de incidencia (oculto) -->
      <div id="incident-form-card" style="display:none; margin-bottom:1.5rem">
        <div class="card animate-in">
          <h3 style="font-family:'Space Grotesk',sans-serif;font-size:0.95rem;font-weight:700;color:var(--fg);margin-bottom:1rem" id="form-incident-title">Nueva incidencia</h3>
          <div style="display:flex;flex-direction:column;gap:0.875rem">
            <div class="form-group">
              <label class="form-label">Tipo</label>
              <select class="form-select" id="incident-type">
                <option value="normal">Normal</option>
                <option value="urgencia">🚨 Urgencia</option>
                <option value="refuerzo">🚌 Refuerzo</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Título *</label>
              <input class="form-input" type="text" id="incident-title" placeholder="Título de la incidencia">
            </div>
            <div class="form-group">
              <label class="form-label">Descripción</label>
              <textarea class="form-textarea" id="incident-desc" placeholder="Descripción detallada..." rows="3"></textarea>
            </div>
            <div style="display:flex;gap:0.75rem">
              <button class="btn btn-secondary" style="flex:1" onclick="closeIncidentForm()">Cancelar</button>
              <button class="btn btn-primary" style="flex:1" id="btn-send-incident">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                Enviar
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Ruta asignada -->
      <div style="display:grid; grid-template-columns:1fr 300px; gap:1.25rem; align-items:start">
        <div class="card animate-in" style="animation-delay:0.15s">
          <div style="display:flex;align-items:center;gap:0.625rem;margin-bottom:1rem">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2">
              <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
              <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
            </svg>
            <h2 style="font-family:'Space Grotesk',sans-serif;font-size:0.95rem;font-weight:700;color:var(--fg)">Ruta actual — Línea 27</h2>
          </div>
          <div id="route-stops" style="display:flex;flex-direction:column;gap:0"></div>
        </div>

        <!-- Stats rápidos -->
        <div style="display:flex;flex-direction:column;gap:1rem">
          <div class="stat-card animate-in" style="animation-delay:0.2s">
            <div class="stat-icon" style="background:var(--info-bg)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--info)" stroke-width="2">
                <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
              </svg>
            </div>
            <div class="stat-value" id="next-stop-time">14:32</div>
            <div class="stat-label">Próxima parada</div>
          </div>
          <div class="stat-card animate-in" style="animation-delay:0.28s">
            <div class="stat-icon" style="background:var(--success-bg)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/>
              </svg>
            </div>
            <div class="stat-value">5/8</div>
            <div class="stat-label">Paradas restantes</div>
          </div>
        </div>
      </div>

    </div>
  </main>
</div>

<script src="/js/api.js"></script>
<script src="/js/toast.js"></script>
<script src="/js/nav.js"></script>
<script>
  requireRole(['conductor', 'gestor']);
  const user = getUser();

  document.getElementById('conductor-subtitle').textContent = `${user?.display_name || 'Conductor'} · Línea ${user?.assigned_line || '27'}`;

  // Ruta mock
  const stops = ['Embajadores','Lavapiés','Atocha','Retiro','Goya','Diego de León','Nuevos Ministerios','Plaza Castilla'];
  const currentStop = 3;

  document.getElementById('route-stops').innerHTML = stops.map((stop, i) => {
    const isPast    = i < currentStop;
    const isCurrent = i === currentStop;
    const isFuture  = i > currentStop;
    return `
      <div style="display:flex;align-items:center;gap:0.875rem">
        <div style="display:flex;flex-direction:column;align-items:center">
          <div style="width:12px;height:12px;border-radius:50%;border:2px solid ${isPast?'var(--success)':isCurrent?'var(--primary)':'hsl(210,20%,30%)'};background:${isPast?'var(--success)':isCurrent?'var(--primary)':'transparent'};${isCurrent?'animation:pulse-dot 2s ease-in-out infinite':''}"></div>
          ${i < stops.length - 1 ? `<div style="width:2px;height:24px;background:${isPast?'hsl(152,60%,42%,0.4)':'hsl(210,20%,25%)'}"></div>` : ''}
        </div>
        <span style="font-size:0.875rem;color:${isCurrent?'var(--primary)':isPast?'var(--muted-fg)':'var(--fg)'};${isPast?'text-decoration:line-through':''}${isCurrent?';font-weight:600':''}">
          ${stop}${isCurrent ? ' <span style="font-size:0.7rem;color:var(--primary);margin-left:0.25rem">← Actual</span>' : ''}
        </span>
      </div>`;
  }).join('');

  // Incidencias
  function openIncidentForm(type) {
    const titles = { normal: '📋 Nueva Incidencia', urgencia: '🚨 Incidencia de URGENCIA', refuerzo: '🚌 Solicitar Refuerzo' };
    document.getElementById('incident-type').value = type;
    document.getElementById('form-incident-title').textContent = titles[type];
    document.getElementById('incident-form-card').style.display = 'block';
    document.getElementById('incident-title').focus();
  }

  function closeIncidentForm() {
    document.getElementById('incident-form-card').style.display = 'none';
    document.getElementById('incident-title').value = '';
    document.getElementById('incident-desc').value  = '';
  }

  document.getElementById('btn-send-incident').addEventListener('click', async () => {
    const type  = document.getElementById('incident-type').value;
    const title = document.getElementById('incident-title').value.trim();
    const desc  = document.getElementById('incident-desc').value.trim();

    if (!title) { Toast.warning('El título es obligatorio'); return; }

    const btn = document.getElementById('btn-send-incident');
    btn.disabled = true; btn.textContent = 'Enviando...';

    try {
      await api.post('/incidents', { type, title, description: desc, line: user?.assigned_line || '27' });
      Toast.success(type === 'urgencia' ? '⚠️ Urgencia enviada al gestor' : 'Incidencia enviada correctamente');
      closeIncidentForm();
    } catch (err) {
      Toast.error(err.message);
    } finally {
      btn.disabled = false;
      btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Enviar`;
    }
  });

  window.openIncidentForm = openIncidentForm;
  window.closeIncidentForm = closeIncidentForm;

  // Actualizar hora
  function updateClock() {
    const now = new Date();
    document.getElementById('next-stop-time').textContent = now.toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit' });
  }
  updateClock(); setInterval(updateClock, 1000);
</script>
</body>
</html>

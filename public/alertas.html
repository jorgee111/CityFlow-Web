<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CityFlow — Alertas</title>
  <meta name="description" content="Alertas y notificaciones del servicio de transporte público de Madrid en tiempo real.">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<button class="btn-menu-toggle" id="menu-toggle">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
  </svg>
</button>
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="page-header">
      <div style="display:flex; align-items:center; justify-content:space-between">
        <div>
          <h1 class="page-title">Alertas</h1>
          <p class="page-subtitle">Notificaciones del servicio</p>
        </div>
        <div style="position:relative">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--fg)" stroke-width="2">
            <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/>
          </svg>
          <span id="alert-badge" style="position:absolute;top:-6px;right:-6px;background:var(--danger);color:white;border-radius:50%;width:18px;height:18px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif">6</span>
        </div>
      </div>
    </div>
    <div class="page-content">
      <div class="space-y-3" id="alerts-list"></div>
    </div>
  </main>
</div>

<script src="/js/api.js"></script>
<script src="/js/toast.js"></script>
<script src="/js/nav.js"></script>
<script>
  requireAuth();

  const ALERTS = [
    { type: 'warning', title: 'Retraso Línea 82', message: 'Retraso de 8 minutos debido a obras en Pirámides. Ruta alternativa: Línea 27.', time: 'Hace 5 min' },
    { type: 'info',    title: 'Desvío temporal M-30', message: 'Obras de mantenimiento en M-30 Sur entre km 12-15. Desvío por salida anterior.', time: 'Hace 15 min' },
    { type: 'success', title: 'Línea N1 restablecida', message: 'El servicio nocturno de la línea N1 ha sido restablecido con normalidad.', time: 'Hace 32 min' },
    { type: 'warning', title: 'Alta ocupación Línea 1', message: 'Ocupación superior al 85% en Línea 1 dirección Sol. Considere la Línea 44 como alternativa.', time: 'Hace 45 min' },
    { type: 'info',    title: 'Mantenimiento programado', message: 'Mañana la Línea 132 tendrá frecuencia reducida de 6:00 a 9:00 por mantenimiento preventivo.', time: 'Hace 1h' },
    { type: 'success', title: 'Tráfico normalizado en A6', message: 'El tráfico en la A6 se ha normalizado tras las retenciones de esta mañana.', time: 'Hace 2h' },
  ];

  const ICONS_ALERT = {
    warning: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
    info:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
    success: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`,
    danger:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`,
  };

  const COLOR_MAP = { warning: 'var(--warning)', info: 'var(--info)', success: 'var(--success)', danger: 'var(--danger)' };

  const container = document.getElementById('alerts-list');
  document.getElementById('alert-badge').textContent = ALERTS.length;

  container.innerHTML = ALERTS.map((a, i) => `
    <div class="alert-card animate-in" style="animation-delay:${i * 0.07}s">
      <div class="alert-icon" style="background:${COLOR_MAP[a.type]}18; color:${COLOR_MAP[a.type]}">
        ${ICONS_ALERT[a.type] || ICONS_ALERT.info}
      </div>
      <div class="alert-body">
        <div class="alert-title">${a.title}</div>
        <div class="alert-message">${a.message}</div>
        <div class="alert-time">${a.time}</div>
      </div>
    </div>
  `).join('');
</script>
</body>
</html>
